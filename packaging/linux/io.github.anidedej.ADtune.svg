<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b7bff"/>
      <stop offset="1" stop-color="#0aa6b8"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- rounded app tile -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)"/>

  <!-- baseline grid -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="2">
    <line x1="22" y1="64" x2="106" y2="64"/>
  </g>
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5">
    <line x1="40" y1="26" x2="40" y2="102"/>
    <line x1="64" y1="26" x2="64" y2="102"/>
    <line x1="88" y1="26" x2="88" y2="102"/>
  </g>

  <!-- soft fill under the response curve -->
  <path d="M22 64
           C 30 40, 38 38, 48 52
           S 62 82, 72 60
           S 88 30, 106 50
           L 106 64 L 22 64 Z"
        fill="url(#fill)"/>

  <!-- frequency-response curve -->
  <path d="M22 64
           C 30 40, 38 38, 48 52
           S 62 82, 72 60
           S 88 30, 106 50"
        fill="none" stroke="#ffffff" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
</svg>
